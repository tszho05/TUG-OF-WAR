<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小二中文：量詞拔河大對決</title>
    <style>
        body {
            font-family: "DFKai-SB", "BiauKai", "標楷體", "KaiTi", serif;
            margin: 0; padding: 0;
            display: flex;
            flex-direction: row;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            background: #f0f8ff;
        }

        /* ── 隊伍側欄 ── */
        .team-panel {
            width: 240px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .team-header {
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }
        #red-team  .team-header { background-color: #e53935; }
        #blue-team .team-header { background-color: #1e88e5; }
        .team-name { font-size: 26px; font-weight: bold; }
        .score-badge {
            background: white;
            border-radius: 50%;
            width: 44px; height: 44px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; font-weight: bold;
        }
        #red-team  .score-badge { color: #e53935; }
        #blue-team .score-badge { color: #1e88e5; }

        .team-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding: 20px 14px 30px;
        }
        #red-team  .team-body { background: #ffebee; }
        #blue-team .team-body { background: #e3f2fd; }

        /* 按鈕網格 */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            width: 100%;
        }
        .btn-option {
            font-family: inherit;
            font-size: 40px;
            padding: 18px 0;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 5px 0 rgba(0,0,0,0.2);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn-option:active { transform: translateY(5px); box-shadow: none; }
        .btn-option:hover  { transform: scale(1.05); box-shadow: 0 7px 0 rgba(0,0,0,0.25); }
        #red-team  .btn-option { background: #ff5252; color: white; }
        #blue-team .btn-option { background: #448aff; color: white; }

        /* ── 中央區域 ── */
        #center-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.08);
        }
        #center-top {
            text-align: center;
            padding: 12px 20px 10px;
            border-top: 1px solid #eee;
        }
        h1 {
            margin: 0 0 6px;
            font-size: 24px;
            background: linear-gradient(90deg, #e74c3c, #f39c12, #27ae60, #2980b9, #8e44ad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
        }
        #question-display {
            font-size: 96px;
            font-weight: bold;
            color: #2c3e50;
            letter-spacing: 4px;
        }

        /* 拔河動畫區 */
        #tug-of-war-area {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #fff;
        }
        #center-line {
            position: absolute;
            left: 50%; top: 0; bottom: 0;
            width: 0;
            border-left: 3px dashed #bbb;
            transform: translateX(-50%);
            z-index: 3;
        }
        #rope-img {
            position: absolute;
            left: 50%; top: 50%;
            transform: translate(-50%, -50%);
            height: 80%;
            width: auto;
            object-fit: contain;
            z-index: 1;
            pointer-events: none;
            transition: transform 0.4s ease-out;
        }
        /* 拔河旗幟 */
        #marker {
            position: absolute;
            left: 50%; top: 50%;
            width: 3px; height: 38px;
            background: #555;
            border-radius: 2px;
            transform: translate(-50%, -6px);
            transition: transform 0.4s ease-out;
            z-index: 5;
        }
        #marker::after {
            content: '';
            position: absolute;
            top: 6px; left: 3px;
            width: 0; height: 0;
            border-top: 11px solid #e74c3c;
            border-bottom: 11px solid transparent;
            border-left: 20px solid #e74c3c;
        }

        /* 答對/答錯動畫 */
        @keyframes correctFlash {
            0%   { transform: scale(1); }
            25%  { background-color: #2ecc71; transform: scale(1.12); }
            50%  { background-color: #27ae60; transform: scale(1.08); }
            75%  { background-color: #2ecc71; transform: scale(1.12); }
            100% { transform: scale(1); }
        }
        @keyframes wrongShake {
            0%   { transform: translateX(0); }
            15%  { transform: translateX(-8px); background-color: #ff1744; }
            30%  { transform: translateX(8px);  background-color: #ff1744; }
            45%  { transform: translateX(-6px); background-color: #ff5252; }
            60%  { transform: translateX(6px);  background-color: #ff5252; }
            75%  { transform: translateX(-3px); }
            90%  { transform: translateX(3px); }
            100% { transform: translateX(0); }
        }
        @keyframes markerBounce {
            0%   { transform: translate(-50%, -6px) translateX(var(--flag-offset, 0px)) rotate(0deg); }
            25%  { transform: translate(-50%, -6px) translateX(var(--flag-offset, 0px)) rotate(-12deg); }
            50%  { transform: translate(-50%, -6px) translateX(var(--flag-offset, 0px)) rotate(9deg); }
            75%  { transform: translate(-50%, -6px) translateX(var(--flag-offset, 0px)) rotate(-5deg); }
            100% { transform: translate(-50%, -6px) translateX(var(--flag-offset, 0px)) rotate(0deg); }
        }
        .btn-correct { animation: correctFlash 0.5s ease forwards; }
        .btn-wrong   { animation: wrongShake  0.5s ease forwards; }
        .btn-locked  { opacity: 0.5; pointer-events: none; }
        #marker.bounce { animation: markerBounce 0.5s ease; }

        /* 勝利畫面 */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,30,0.88);
            color: white;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        #confetti-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 101;
        }
        .confetti-piece {
            position: absolute;
            top: -20px; opacity: 0;
            animation: confettiFall linear forwards;
        }
        @keyframes confettiFall {
            0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
            80%  { opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
        #winner-text {
            font-size: 80px; margin-bottom: 30px; font-weight: bold;
            position: relative; z-index: 102;
        }
        #restart-btn {
            font-size: 30px; padding: 15px 40px; cursor: pointer;
            border-radius: 10px; border: none; font-family: inherit;
            position: relative; z-index: 102;
        }
    </style>
</head>
<body>

    <!-- 左側：紅隊 -->
    <div id="red-team" class="team-panel">
        <div class="team-header">
            <span class="team-name">紅隊</span>
            <span class="score-badge" id="red-score">0</span>
        </div>
        <div class="team-body">
            <div class="options-grid" id="red-options"></div>
        </div>
    </div>

    <!-- 中央 -->
    <div id="center-panel">
        <div id="tug-of-war-area">
            <div id="center-line"></div>
            <img id="rope-img" src="IMAGE/rope.png" alt="rope" onerror="this.style.display='none'">
            <div id="marker"></div>
        </div>
        <div id="center-top">
            <h1>🏆 量詞拔河大對決 🏆</h1>
            <div id="question-display">一（　）準備中...</div>
        </div>
    </div>

    <!-- 右側：藍隊 -->
    <div id="blue-team" class="team-panel">
        <div class="team-header">
            <span class="team-name">藍隊</span>
            <span class="score-badge" id="blue-score">0</span>
        </div>
        <div class="team-body">
            <div class="options-grid" id="blue-options"></div>
        </div>
    </div>

    <!-- 勝利遮罩 -->
    <div id="overlay">
        <div id="confetti-container"></div>
        <div id="winner-text">紅隊勝出！</div>
        <button id="restart-btn" onclick="startGame()">再玩一次</button>
    </div>

    <script>
        const questionBank = [
            { item: "魚", answer: "條", options: ["條", "隻", "頭", "個"] },
            { item: "牛", answer: "頭", options: ["頭", "隻", "條", "個"] },
            { item: "飛機", answer: "架", options: ["架", "輛", "艘", "隻"] },
            { item: "船", answer: "艘", options: ["艘", "架", "輛", "條"] },
            { item: "樹", answer: "棵", options: ["棵", "條", "張", "個"] },
            { item: "巴士", answer: "輛", options: ["輛", "架", "艘", "隻"] },
            { item: "故事書", answer: "本", options: ["本", "張", "個", "條"] },
            { item: "白紙", answer: "張", options: ["張", "本", "條", "個"] },
            { item: "鉛筆", answer: "枝", options: ["枝", "條", "本", "把"] },
            { item: "剪刀", answer: "把", options: ["把", "個", "條", "枝"] },
            { item: "蝴蝶", answer: "隻", options: ["隻", "條", "個", "頭"] },
            { item: "山", answer: "座", options: ["座", "個", "條", "塊"] },
            { item: "彩虹", answer: "道", options: ["道", "條", "個", "座"] },
            { item: "糖", answer: "粒", options: ["粒", "塊", "個", "條"] },
            { item: "房間", answer: "間", options: ["間", "個", "座", "張"] },
            { item: "電話", answer: "部", options: ["部", "個", "條", "架"] },
            { item: "歌", answer: "首", options: ["首", "個", "條", "篇"] },
            { item: "床", answer: "張", options: ["張", "個", "條", "塊"] },
            { item: "雨傘", answer: "把", options: ["把", "條", "個", "架"] },
            { item: "蘋果", answer: "個", options: ["個", "粒", "塊", "條"] },
            { item: "馬", answer: "匹", options: ["匹", "頭", "隻", "條"] }
        ];

        let currentQuestion = {};
        let markerPosition = 50;
        const step = 10;
        let redScore = 0;
        let blueScore = 0;
        let redCooldown = false;
        let blueCooldown = false;

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function loadQuestion() {
            const randomIndex = Math.floor(Math.random() * questionBank.length);
            currentQuestion = questionBank[randomIndex];
            document.getElementById("question-display").innerText = `一（　）${currentQuestion.item}`;
            renderOptions("red-options",  shuffleArray([...currentQuestion.options]), "red");
            renderOptions("blue-options", shuffleArray([...currentQuestion.options]), "blue");
        }

        function renderOptions(containerId, options, team) {
            const container = document.getElementById(containerId);
            container.innerHTML = "";
            options.forEach(opt => {
                const btn = document.createElement("button");
                btn.className = "btn-option";
                btn.innerText = opt;
                btn.onpointerdown = function() { checkAnswer(opt, team, this); };
                container.appendChild(btn);
            });
        }

        function checkAnswer(selectedOption, team, clickedBtn) {
            if (clickedBtn.classList.contains('btn-correct')) return;
            if (team === 'red'  && redCooldown)  return;
            if (team === 'blue' && blueCooldown) return;

            if (selectedOption === currentQuestion.answer) {
                if (team === "red") {
                    markerPosition -= step; // 紅隊在左，拉向左方
                    redScore++;
                    document.getElementById("red-score").innerText = redScore;
                } else {
                    markerPosition += step; // 藍隊在右，拉向右方
                    blueScore++;
                    document.getElementById("blue-score").innerText = blueScore;
                }

                clickedBtn.classList.add('btn-correct');

                const marker = document.getElementById("marker");
                const offset = (markerPosition - 50) * 8;
                marker.style.setProperty('--flag-offset', offset + 'px');
                marker.classList.remove('bounce');
                void marker.offsetWidth;
                marker.classList.add('bounce');

                updateMarker();

                setTimeout(() => {
                    clickedBtn.classList.remove('btn-correct');
                    marker.classList.remove('bounce');
                    checkWinCondition();
                }, 520);

            } else {
                // 只鎖定答錯一方的按鈕
                const optionsId = team === 'red' ? '#red-options' : '#blue-options';
                if (team === 'red') {
                    redCooldown = true;
                } else {
                    blueCooldown = true;
                }
                clickedBtn.classList.add('btn-wrong');
                document.querySelectorAll(optionsId + ' .btn-option').forEach(btn => btn.classList.add('btn-locked'));
                setTimeout(() => {
                    clickedBtn.classList.remove('btn-wrong');
                    document.querySelectorAll(optionsId + ' .btn-option').forEach(btn => btn.classList.remove('btn-locked'));
                    if (team === 'red') redCooldown = false;
                    else blueCooldown = false;
                }, 700);
            }
        }

        function updateMarker() {
            // 答對的隊伍將繩子拉向自己：
            // 紅隊(左)答對 → markerPosition減少 → offset負值 → 圖片左移
            // 藍隊(右)答對 → markerPosition增加 → offset正值 → 圖片右移
            const offset = (markerPosition - 50) * 8;
            document.getElementById("rope-img").style.transform =
                `translate(-50%, -50%) translateX(${offset}px)`;
            document.getElementById("marker").style.transform =
                `translate(-50%, -6px) translateX(${offset}px)`;
        }

        function checkWinCondition() {
            if (markerPosition <= 10) {
                showWinner("紅隊勝出！ 🎉");
            } else if (markerPosition >= 90) {
                showWinner("藍隊勝出！ 🎉");
            } else {
                loadQuestion();
            }
        }

        function launchConfetti() {
            const container = document.getElementById("confetti-container");
            container.innerHTML = "";
            const colors = ["#e74c3c","#e67e22","#f1c40f","#2ecc71","#3498db","#9b59b6","#1abc9c","#e91e63","#ff9800"];
            for (let i = 0; i < 120; i++) {
                const piece = document.createElement("div");
                piece.className = "confetti-piece";
                piece.style.left = Math.random() * 100 + "vw";
                piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                const size = 8 + Math.random() * 10;
                const r = Math.random();
                if (r < 0.33) {
                    piece.style.width = piece.style.height = size + "px";
                    piece.style.borderRadius = "50%";
                } else if (r < 0.66) {
                    piece.style.width = piece.style.height = size + "px";
                    piece.style.borderRadius = "2px";
                } else {
                    piece.style.width  = (size * 0.5) + "px";
                    piece.style.height = (size * 1.8) + "px";
                }
                piece.style.animationDuration = (1.5 + Math.random() * 2) + "s";
                piece.style.animationDelay    = (Math.random() * 2) + "s";
                container.appendChild(piece);
            }
        }

        function showWinner(text) {
            document.getElementById("winner-text").innerText = text;
            launchConfetti();
            document.getElementById("overlay").style.display = "flex";
        }

        function startGame() {
            markerPosition = 50;
            redScore = 0; blueScore = 0;
            redCooldown = false; blueCooldown = false;
            document.getElementById("red-score").innerText  = "0";
            document.getElementById("blue-score").innerText = "0";
            document.getElementById("rope-img").style.transform = "translate(-50%, -50%)";
            document.getElementById("marker").style.transform    = "translate(-50%, -6px)";
            document.getElementById("confetti-container").innerHTML = "";
            document.getElementById("overlay").style.display = "none";
            document.querySelectorAll('.btn-option').forEach(btn => btn.classList.remove('btn-locked'));
            loadQuestion();
        }

        window.onload = startGame;
    </script>
</body>
</html>
